meta:
  timezone: "Asia/Ho_Chi_Minh"

schedule:
  skip_weekends: true
  holidays: []          # vd: ["2026-09-02"]

defaults:
  cooldown_hours: 24

# ── DAILY CHECKLISTS (informational, always run) ──────────────────────────────
# These produce summary lists sent each scan — not violation alerts.
checklists:
  - id: CL_TEST_START_TODAY
    name: "Tasks cần start test hôm nay"
    condition: "test_start_date == today"
    fields: [key, title, status]
    channels: [qe_channel, dev_channel]

  - id: CL_TEST_DUE_TODAY
    name: "Tasks cần hoàn thành test hôm nay"
    condition: "test_complete_date == today"
    fields: [key, title, status]
    channels: [qe_channel]

  - id: CL_SANDBOX_DUE_TOMORROW
    name: "Tasks sandbox ngày mai"
    condition: "sandbox_date == workdays_add(today, 1)"
    fields: [key, title, assignee]
    recipients: [assignee]
    channels: [dev_channel]

  - id: CL_BLOCKED_TICKETS
    name: "Blocked tickets"
    condition: "status == 'Blocked'"
    recipients: [qe_pic, assignee]
    channels: [dev_channel]

rules:
  # ── LEVEL 0: DATA HYGIENE ─────────────────────────────────────────────────
  - id: L0_MISSING_DATES
    name: "Thiếu sandbox date / test start date / test complete date"
    level: 0
    type: reactive
    condition: >
      is_empty(sandbox_date)
      or is_empty(test_start_date)
      or is_empty(test_complete_date)
    recipients: [qe_pic]
    channels: [qe_channel]
    message: "⚪ {key} thiếu ngày ({missing_dates}) — vui lòng điền đủ."

  # ── LEVEL 1: VIOLENT ──────────────────────────────────────────────────────
  - id: L1_TEST_START_OVERDUE
    name: "Quá test start date, chưa start test"
    level: 1
    type: reactive
    condition: >
      test_start_date <= today
      and status_rank < rank('InTest')
    recipients: [qe_pic, assignee]
    channels: [qe_channel, dev_channel]
    message: "🔴 {key} đã qua test start date ({test_start_date}) nhưng đang {status}."

  - id: L1_TEST_COMPLETE_OVERDUE
    name: "Quá test complete date, chưa qua InTest"
    level: 1
    type: reactive
    condition: >
      test_complete_date < today
      and status in ('New', 'In Analysis', 'InDev', 'Reviewed', 'Ready for testing', 'InTest', 'Walkthrough')
    recipients: [qe_pic]
    channels: [qe_channel, dev_channel]
    message: "🔴 {key} quá hạn test complete ({test_complete_date}) — đang {status}."

  - id: L1_TOO_MANY_SAME_TEST_START
    name: "Quá 3 ticket cùng test start date hôm nay"
    level: 1
    type: aggregate
    aggregate_by: qe_pic
    aggregate_by_fallback: labels   # nếu qe_pic trống -> dùng label đầu tiên
    filter: "test_start_date == today"
    condition: "count > 3"
    recipients: [qe_pic]
    channels: [qe_channel]
    message: "🔴 {qe_pic} có {count} tickets cùng test start date hôm nay: {ticket_list}."

  - id: L1_SANDBOX_DATE_WRONG_STATUS
    name: "Đến sandbox date nhưng chưa Walkthrough / Ready for Testing"
    level: 1
    type: reactive
    condition: >
      sandbox_date == today
      and status not in ('Walkthrough', 'Ready for testing')
    actions:
      - add_label: "NoQE"
      - add_label: "NoQC"
    recipients: [qe_pic, assignee]
    channels: [qe_channel, dev_channel]
    message: "🔴 {key} đến sandbox date nhưng đang {status} — gán label NoQE/NoQC."

  # ── LEVEL 2: RISK (không commit được theo plan) ────────────────────────────
  - id: L2_OVERDUE_STILL_INREVIEW
    name: "Quá test complete date, vẫn InReview"
    level: 2
    type: reactive
    condition: >
      test_complete_date < today
      and status == 'InReview'
    recipients: [qe_pic]
    channels: [qe_channel]
    message: "🟠 {key} quá hạn test complete ({test_complete_date}), đang {status}"

  - id: L2_DUE_TODAY_SP3_NOT_TESTING
    name: "Hết hạn hôm nay, SP=3, chưa InTest/InReview"
    level: 2
    type: reactive
    condition: >
      test_complete_date == today
      and story_point == 3
      and status_rank <= rank('InTest')
    recipients: [qe_pic]
    channels: [qe_channel]
    message: "🟠 {key} hết hạn hôm nay, SP=3, đang {status}."

  - id: L2_DUE_1DAY_AGO_SP5_NOT_TESTING
    name: "Quá hạn 1 ngày, SP=5, chưa InTest/InReview"
    level: 2
    type: reactive
    condition: >
      test_complete_date == workdays_add(today, -1)
      and story_point == 5
      and status_rank <= rank('InTest')
    recipients: [qe_pic]
    channels: [qe_channel]
    message: "🟠 {key} quá hạn 1 ngày, SP=5, đang {status}."

  - id: L2_DUE_2DAYS_AGO_SP8_NOT_TESTING
    name: "Quá hạn 2 ngày, SP=8, chưa InTest/InReview"
    level: 2
    type: reactive
    condition: >
      test_complete_date == workdays_add(today, -2)
      and story_point == 8
      and status_rank <= rank('InTest')
    recipients: [qe_pic]
    channels: [qe_channel]
    message: "🟠 {key} quá hạn 2 ngày, SP=8, đang {status}."

  # ── LEVEL 3: WARNING ──────────────────────────────────────────────────────
  - id: L3_DUE_TODAY_SP3_IN_TEST
    name: "Hết hạn hôm nay, SP=3, đang InTest"
    level: 3
    type: reactive
    condition: >
      test_complete_date == today
      and story_point == 3
      and status == 'InTest'
    recipients: [qe_pic]
    channels: [qe_channel]
    message: "🟡 {key} hết hạn hôm nay, SP=3, đang InTest — theo dõi tiến độ."

  - id: L3_DUE_1DAY_AGO_SP5_OR_8_IN_TEST
    name: "Quá hạn 1 ngày, SP=5 hoặc 8, đang InTest"
    level: 3
    type: reactive
    condition: >
      test_complete_date == workdays_add(today, -1)
      and story_point in (5, 8)
      and status == 'InTest'
    recipients: [qe_pic]
    channels: [qe_channel]
    message: "🟡 {key} quá hạn 1 ngày, SP={story_point}, đang InTest."

  - id: L3_PRE_SANDBOX_2DAYS_SP8_NOT_INDEV
    name: "Còn 2 ngày đến sandbox, SP=8, chưa InDev"
    level: 3
    type: reactive
    condition: >
      sandbox_date == workdays_add(today, 2)
      and status_rank < rank('InDev')
      and story_point == 8
    actions:
      - add_label: "NoQE"
      - add_label: "NoQC"
    recipients: [qe_pic, assignee]
    channels: [qe_channel]
    message: "🟡 {key} còn 2 ngày đến sandbox, SP=8, chưa InDev — gán label NoQE/NoQC."

  - id: L3_PRE_SANDBOX_1DAY_SP5_NOT_INDEV
    name: "Còn 1 ngày đến sandbox, SP=5, chưa InDev"
    level: 3
    type: reactive
    condition: >
      sandbox_date == workdays_add(today, 1)
      and status_rank < rank('InDev')
      and story_point == 5
    actions:
      - add_label: "NoQE"
      - add_label: "NoQC"
    recipients: [qe_pic, assignee]
    channels: [dev_channel]
    message: "🟡 {key} còn 1 ngày đến sandbox, SP=5, chưa InDev — gán label NoQE/NoQC."
